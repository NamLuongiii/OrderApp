<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đơn hàng thành công</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4;">
<div style="max-width: 600px; margin: 0 auto; background-color: #fff; padding: 20px; border-radius: 8px;">
    <h1 style="color: #4CAF50; text-align: center;">✓ Đơn hàng thành công</h1>

    <p><strong>Mã đơn hàng:</strong> {{.OrderID}}</p>

    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
        <thead>
        <tr style="background-color: #4CAF50; color: white;">
            <th style="padding: 10px; text-align: left;">Sản phẩm</th>
            <th style="padding: 10px; text-align: center;">SL</th>
            <th style="padding: 10px; text-align: right;">Giá</th>
            <th style="padding: 10px; text-align: right;">Tổng</th>
        </tr>
        </thead>
        <tbody>
        {{range .Products}}
        <tr>
            <td style="padding: 10px; border-bottom: 1px solid #ddd;">{{.ProductName}}</td>
            <td style="padding: 10px; border-bottom: 1px solid #ddd; text-align: center;">{{.Quantity}}</td>
            <td style="padding: 10px; border-bottom: 1px solid #ddd; text-align: right;">{{.Price}}đ</td>
            <td style="padding: 10px; border-bottom: 1px solid #ddd; text-align: right;">{{.Total}}đ</td>
        </tr>
        {{end}}
        </tbody>
    </table>

    <p style="margin-top: 30px; text-align: center; color: #666;">Cảm ơn bạn đã đặt hàng!</p>
</div>
</body>
</html>
